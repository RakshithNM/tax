  <text x="116" y="372" fill="#cccccc" font-family="Menlo" font-size="23">Presumptive income, slab tax, interest, dividends,</text>
  <text x="116" y="408" fill="#cccccc" font-family="Menlo" font-size="23">and equity LTCG threshold planning.</text>
