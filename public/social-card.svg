<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Freelancer Tax Optimization Calculator social preview</title>
  <desc id="desc">A dark social preview card for an Indian freelance tax calculator with presumptive income and LTCG threshold metrics.</desc>
  <rect width="1200" height="630" fill="#000000"/>
  <path d="M0 0h1200v630H0z" fill="#000000"/>
